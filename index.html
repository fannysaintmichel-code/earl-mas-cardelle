<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EARL du Mas Cardelle</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; margin:0; }
header { background:#2e7d32; color:white; padding:10px; }
button { padding:10px; margin:5px; font-size:16px; }
.card { border:1px solid #ccc; padding:10px; margin:10px; }
#map { height:300px; }
</style>
</head>

<body>

<header>🌾 EARL du Mas Cardelle</header>

<div id="app"></div>

<script>

// ===== SUPABASE CONFIG =====
const supabase = supabase.createClient(
"https://xuklvtvspoxrdsthfjvs.supabase.co",
"sb_publishable_tfqgd2thRE5-T_O7PUhXcA_Bh2H-g2z"
);

// ===== LOGIN SIMPLE =====
let user = null;

async function login(){
  let email = prompt("Email ?");
  await supabase.auth.signInWithOtp({ email });
  alert("Vérifie ton email 👍");
}

// ===== LOAD DATA =====
let parcelles = [];

async function load(){
  let { data } = await supabase.from("parcelles").select("*");
  parcelles = data || [];
  accueil();
}

// ===== SAVE CLOUD =====
async function saveCloud(p){
  await supabase.from("parcelles").insert([p]);
}

// ===== UI =====
function accueil(){
document.getElementById("app").innerHTML = `
<button onclick="login()">👤 Connexion</button>
<button onclick="newParcelle()">➕ Nouvelle parcelle</button>

${parcelles.map(p=>`
<div class="card">
<b>${p.nom}</b><br>
${p.surface} ha - ${p.culture}
</div>
`).join("")}
`;
}

function newParcelle(){
document.getElementById("app").innerHTML = `
<input id="nom" placeholder="Nom">
<input id="culture" placeholder="Culture">
<div id="map"></div>
<button onclick="save()">💾 Enregistrer</button>
<button onclick="accueil()">⬅️ Retour</button>
`;

initMap();
}

// ===== MAP =====
let map, points=[], polygon;

function initMap(){
map = L.map('map').setView([43.8,4.6],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

map.on('click', e=>{
points.push([e.latlng.lat,e.latlng.lng]);

if(polygon) map.removeLayer(polygon);
polygon = L.polygon(points).addTo(map);
});
}

// ===== CALCUL =====
function surface(coords){
let area=0;
for(let i=0;i<coords.length;i++){
let [x1,y1]=coords[i];
let [x2,y2]=coords[(i+1)%coords.length];
area += x1*y2 - x2*y1;
}
return Math.abs(area/2)*111139*111139/10000;
}

// ===== SAVE =====
async function save(){

if(points.length<3) return;

let nom = document.getElementById("nom").value;
let culture = document.getElementById("culture").value;

let surf = surface(points).toFixed(2);

let p = {
nom,
culture,
surface:surf,
points
};

await saveCloud(p);

alert("Sauvegardé en ligne ✅");

points=[];
load();
}

// ===== START =====
load();

</script>

</body>
</html>
