<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EARL du Mas Cardelle</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { font-family: Arial; margin:0; padding:10px; }
button { padding:10px; margin:5px; font-size:16px; }
input { padding:8px; margin:5px; width:90%; }
.card { border:1px solid #ccc; padding:10px; margin:10px 0; }
#map { height:300px; margin-top:10px; }
</style>
</head>

<body>

<h2>🌾 EARL du Mas Cardelle</h2>

<button onclick="showAdd()">➕ Nouvelle parcelle</button>
<button onclick="exportRegistre()">📄 Export</button>
<button onclick="sauvegarde()">☁️ Sauvegarde</button>
<button onclick="bilan()">📊 Bilan</button>
<button onclick="ndvi()">🛰️ NDVI</button>

<input type="file" onchange="importPAC(this)">

<div id="gps"></div>
<div id="meteo"></div>

<div id="map"></div>

<div id="form" style="display:none;">
<input id="nom" placeholder="Nom parcelle">
<input id="culture" placeholder="Culture">
<button onclick="save()">💾 Enregistrer</button>
</div>

<h3>📄 Mes parcelles</h3>
<div id="list"></div>

<script>

// ===== CARTE + SATELLITE =====
let map = L.map('map').setView([43.8,4.6],13);

let normal = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

let satellite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

normal.addTo(map);

L.control.layers({
"Carte": normal,
"Satellite": satellite
}).addTo(map);

// ===== GPS + METEO =====
navigator.geolocation.watchPosition(pos=>{
let lat = pos.coords.latitude;
let lng = pos.coords.longitude;

document.getElementById("gps").innerHTML =
"📡 GPS : "+lat.toFixed(5)+" , "+lng.toFixed(5);

L.marker([lat,lng]).addTo(map);

// météo
fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`)
.then(r=>r.json())
.then(data=>{
document.getElementById("meteo").innerHTML =
"🌦️ Température : " + data.current_weather.temperature + "°C";
});
});

// ===== DATA =====
let parcelles = JSON.parse(localStorage.getItem("parcelles")||"[]");

// ===== DESSIN =====
let points=[];
let polygon;

map.on('click', e=>{
points.push([e.latlng.lat,e.latlng.lng]);

if(polygon) map.removeLayer(polygon);

polygon = L.polygon(points,{color:'green'}).addTo(map);
});

// ===== SURFACE =====
function surface(coords){
let area=0;
for(let i=0;i<coords.length;i++){
let [x1,y1]=coords[i];
let [x2,y2]=coords[(i+1)%coords.length];
area += x1*y2 - x2*y1;
}
return Math.abs(area/2)*111139*111139/10000;
}

// ===== UI =====
function showAdd(){
document.getElementById("form").style.display="block";
}

// ===== SAVE =====
function save(){

if(points.length<3){
alert("Dessine la parcelle !");
return;
}

let nom = document.getElementById("nom").value;
let culture = document.getElementById("culture").value;

if(!nom){
alert("Nom manquant");
return;
}

let surf = surface(points).toFixed(2);

let rendement = prompt("Rendement t/ha ?");
let prix = prompt("Prix €/t ?");
let cout = prompt("Coût € ?");

let marge = (rendement*prix*surf)-cout;

parcelles.push({
id:Date.now(),
nom,culture,
surface:surf,
marge,
points,
interventions:[]
});

localStorage.setItem("parcelles",JSON.stringify(parcelles));

points=[];
if(polygon) map.removeLayer(polygon);

update();
}

// ===== INTERVENTIONS =====
function addInter(id){
let type = prompt("Produit");
let dose = prompt("Dose");
let date = prompt("Date");

let p = parcelles.find(x=>x.id==id);
p.interventions.push({type,dose,date});

localStorage.setItem("parcelles",JSON.stringify(parcelles));

update();
}

// ===== IMPORT PAC =====
function importPAC(input){
let file = input.files[0];
let reader = new FileReader();

reader.onload = function(e){
let geo = JSON.parse(e.target.result);

geo.features.forEach(f=>{
let coords = f.geometry.coordinates[0].map(c=>[c[1],c[0]]);
let surf = surface(coords).toFixed(2);

parcelles.push({
id:Date.now()+Math.random(),
nom:"PAC",
culture:"",
surface:surf,
points:coords,
interventions:[]
});

L.polygon(coords,{color:'blue'}).addTo(map);
});

localStorage.setItem("parcelles",JSON.stringify(parcelles));
update();
};

reader.readAsText(file);
}

// ===== LIST =====
function update(){
document.getElementById("list").innerHTML =
parcelles.map(p=>`
<div class="card">
<b>🌱 ${p.nom}</b><br>
Culture: ${p.culture}<br>
Surface: ${p.surface} ha<br>
Marge: ${Math.round(p.marge||0)} €<br>
<button onclick="addInter(${p.id})">🚜 Intervention</button>
${p.interventions.map(i=>`
<div>• ${i.date} - ${i.type} (${i.dose})</div>
`).join("")}
</div>
`).join("");
}

update();

// ===== EXPORT =====
function exportRegistre(){
let txt="REGISTRE PHYTO\n\n";

parcelles.forEach(p=>{
txt+="Parcelle: "+p.nom+"\n";
p.interventions.forEach(i=>{
txt+=`${i.date} - ${i.type} - ${i.dose}\n`;
});
txt+="\n";
});

let blob=new Blob([txt]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="registre.txt";
a.click();
}

// ===== SAUVEGARDE =====
function sauvegarde(){
let data = JSON.stringify(parcelles);
navigator.clipboard.writeText(data);
alert("Sauvegarde copiée 👍");
}

// ===== BILAN =====
function bilan(){
let totalSurface=0;
let totalMarge=0;

parcelles.forEach(p=>{
totalSurface += Number(p.surface);
totalMarge += Number(p.marge||0);
});

alert(
"📊 BILAN\n\n"+
"Surface : "+totalSurface.toFixed(2)+" ha\n"+
"Marge : "+Math.round(totalMarge)+" €"
);
}

// ===== NDVI =====
function ndvi(){
alert("Utilise la vue satellite pour observer la vigueur des cultures 🌱");
}

</script>

</body>
</html>
