<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EARL du Mas Cardelle</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { font-family: Arial; margin:0; }
header { background:#2e7d32; color:white; padding:10px; }
button { padding:10px; margin:5px; font-size:16px; }
.card { border:1px solid #ccc; padding:10px; margin:10px; }
#map { height:300px; }
</style>
</head>

<body>

<header>
🌾 EARL du Mas Cardelle
</header>

<div id="app"></div>

<script>

// ===== DATA =====
let parcelles = JSON.parse(localStorage.getItem("parcelles")||"[]");

// ===== NAVIGATION =====
function accueil(){
document.getElementById("app").innerHTML = `
<button onclick="newParcelle()">➕ Nouvelle parcelle</button>
<button onclick="bilan()">📊 Bilan</button>

${parcelles.map(p=>`
<div class="card">
<b>${p.nom}</b><br>
${p.surface} ha - ${p.culture}<br>
<button onclick="voir(${p.id})">👁️ Voir</button>
</div>
`).join("")}
`;
}

function newParcelle(){
document.getElementById("app").innerHTML = `
<input id="nom" placeholder="Nom">
<input id="culture" placeholder="Culture">
<div id="map"></div>
<button onclick="save()">💾 Enregistrer</button>
<button onclick="accueil()">⬅️ Retour</button>
`;

initMap();
}

function voir(id){
let p = parcelles.find(x=>x.id==id);

document.getElementById("app").innerHTML = `
<div class="card">
<b>${p.nom}</b><br>
Surface: ${p.surface} ha<br>
Culture: ${p.culture}<br>
Marge: ${Math.round(p.marge||0)} €<br>

<button onclick="addInter(${p.id})">🚜 Intervention</button>
<button onclick="accueil()">⬅️ Retour</button>

${p.interventions.map(i=>`
<div>• ${i.date} - ${i.type}</div>
`).join("")}
</div>
`;
}

// ===== MAP =====
let map, points=[], polygon;

function initMap(){
map = L.map('map').setView([43.8,4.6],13);

let normal = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

let satellite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

let cadastre = L.tileLayer(
'https://wxs.ign.fr/parcellaire/geoportail/wmts?REQUEST=GetTile&SERVICE=WMTS&VERSION=1.0.0&LAYER=CADASTRALPARCELS.PARCELS&STYLE=normal&TILEMATRIXSET=PM&FORMAT=image/png&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}'
);

normal.addTo(map);

L.control.layers({
"Carte": normal,
"Satellite": satellite,
"Cadastre": cadastre
}).addTo(map);

// GPS
navigator.geolocation.watchPosition(pos=>{
L.marker([pos.coords.latitude,pos.coords.longitude]).addTo(map);
});

map.on('click', e=>{
points.push([e.latlng.lat,e.latlng.lng]);

if(polygon) map.removeLayer(polygon);
polygon = L.polygon(points).addTo(map);
});
}

// ===== CALCUL =====
function surface(coords){
let area=0;
for(let i=0;i<coords.length;i++){
let [x1,y1]=coords[i];
let [x2,y2]=coords[(i+1)%coords.length];
area += x1*y2 - x2*y1;
}
return Math.abs(area/2)*111139*111139/10000;
}

// ===== SAVE =====
function save(){
if(points.length<3) return;

let nom = document.getElementById("nom").value;
let culture = document.getElementById("culture").value;

let surf = surface(points).toFixed(2);

let rendement = prompt("Rendement ?");
let prix = prompt("Prix ?");
let cout = prompt("Coût ?");

let marge = (rendement*prix*surf)-cout;

parcelles.push({
id:Date.now(),
nom,culture,
surface:surf,
marge,
points,
interventions:[]
});

localStorage.setItem("parcelles",JSON.stringify(parcelles));

points=[];
accueil();
}

// ===== INTERVENTIONS =====
function addInter(id){
let type = prompt("Produit");
let date = prompt("Date");

let p = parcelles.find(x=>x.id==id);
p.interventions.push({type,date});

localStorage.setItem("parcelles",JSON.stringify(parcelles));

voir(id);
}

// ===== BILAN =====
function bilan(){
let s=0,m=0;
parcelles.forEach(p=>{
s+=Number(p.surface);
m+=Number(p.marge||0);
});

alert("Surface: "+s+" ha\nMarge: "+m+" €");
}

// ===== START =====
accueil();

</script>

</body>
</html>
